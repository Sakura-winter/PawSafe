<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSafe - Join Our Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        
input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--warm);
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
    
    
    box-sizing: border-box; 
}


* {
    box-sizing: border-box;
}
        :root {
            --cream: #FAF6F0; --warm: #F5ECD8; --bark: #3D2B1F; 
            --rust: #C0502A; --card-bg: #FFFDF9; --border: #E8DDD0;
            --radius: 20px;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--bark);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .register-card {
            background: var(--card-bg);
            border: 2px solid var(--bark);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%; max-width: 450px;
            box-shadow: 6px 6px 0 var(--bark);
        }
        h2 {
            font-family: 'Fraunces', serif;
            font-size: 2rem; font-weight: 900;
            margin-bottom: 8px; text-align: center;
        }
        .subtitle {
            text-align: center; color: #6B4A36;
            margin-bottom: 30px; font-size: 0.9rem;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-weight: 700; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        input {
            width: 100%; padding: 12px 16px;
            border: 2px solid var(--border); border-radius: 12px;
            background: var(--warm); font-family: inherit;
            transition: border-color 0.2s; outline: none;
        }
        input:focus { border-color: var(--rust); }
        .btn-register {
            width: 100%; padding: 14px;
            background: var(--rust); color: white;
            border: 2px solid var(--bark); border-radius: 12px;
            font-weight: 700; cursor: pointer;
            box-shadow: 3px 3px 0 var(--bark);
            transition: all 0.1s; margin-top: 10px;
        }
        .btn-register:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--bark); }
        .footer-link {
            text-align: center; margin-top: 20px; font-size: 0.85rem;
        }
        .footer-link a { color: var(--rust); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="register-card">
    <div style="text-align: center; font-size: 3rem; margin-bottom: 10px;">🐾</div>
    <h2>Join PawSafe</h2>
    <p class="subtitle">Help us reunite pets with their families.</p>

    <form id="registerForm">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a unique name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="+91 ..." required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-register">Create Account 🐾</button>
    </form>

    <div class="footer-link">
        Already a member? <a href="/accounts/login-page/">Sign In</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone_number: document.getElementById('phone').value,
            password: document.getElementById('password').value
        };
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        try {
            const response = await fetch('/accounts/register/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (response.ok) {
                alert("Registration successful! Welcome to the pack.");
                window.location.href = "/accounts/login-page/";
            } else {
                alert("Error: " + JSON.stringify(result));
            }
        } catch (error) {
            console.error("Register Error:", error);
        }
    });
</script>

</body>
</html>
