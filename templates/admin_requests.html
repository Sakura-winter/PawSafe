<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSafe Admin Requests</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --warm: #f5ecd8;
            --bark: #3d2b1f;
            --bark-light: #6b4a36;
            --rust: #c0502a;
            --sage: #5c7a5a;
            --border: #e8ddd0;
            --card: #fffdf9;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #fff2df 0, var(--cream) 40%);
            color: var(--bark);
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(250, 246, 240, 0.95);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            font-weight: 900;
        }

        .logo span { color: var(--rust); }

        .btn {
            border: 2px solid var(--bark);
            border-radius: 12px;
            background: var(--warm);
            color: var(--bark);
            font-weight: 700;
            padding: 8px 12px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--bark);
        }

        .btn.rust { background: var(--rust); color: #fff; }
        .btn.sage { background: var(--sage); color: #fff; }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 3px 3px 0 var(--border);
            overflow: hidden;
        }

        .panel-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-family: 'Fraunces', serif;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 75vh;
            overflow: auto;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--warm);
            padding: 10px;
        }

        .meta {
            color: var(--bark-light);
            font-size: 0.82rem;
            margin-top: 3px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        textarea, select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            font-family: inherit;
            background: #fff;
            color: var(--bark);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 0.74rem;
            font-weight: 700;
            margin-left: 6px;
        }

        .status.pending { background: #ffe9b8; }
        .status.accepted { background: #d5efdc; }
        .status.rejected { background: #f6d8d8; }

        .messages {
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            max-height: 170px;
            overflow: auto;
            padding: 8px;
        }

        .msg {
            padding: 6px 7px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: #f8f1e5;
            font-size: 0.84rem;
        }

        .msg-head {
            font-weight: 700;
            font-size: 0.74rem;
            color: var(--bark-light);
        }

        .empty {
            color: var(--bark-light);
            text-align: center;
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: #fff;
        }

        .tab-group {
            display: inline-flex;
            gap: 6px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--bark-light);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 5px 9px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--warm);
            color: var(--bark);
        }

        @media (max-width: 980px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav>
    <div class="logo">Paw<span>Safe</span> Admin</div>
    <div style="display:flex; gap:8px;">
        <a class="btn" href="/accounts/dashboard/">Dashboard</a>
        <a class="btn" href="/admin/">Django Admin</a>
    </div>
</nav>

<main>
    <section class="panel">
        <div class="panel-head">
            <div style="display:flex;align-items:center;gap:8px;">
                <span>Lost/Found Requests</span>
                <div class="tab-group">
                    <button id="report-tab-pending" class="tab-btn active" type="button" onclick="setReportTab('pending')">Pending</button>
                    <button id="report-tab-all" class="tab-btn" type="button" onclick="setReportTab('all')">All</button>
                </div>
            </div>
            <button class="btn" type="button" onclick="loadReports(reportTab)">Refresh</button>
        </div>
        <div id="reportList" class="list"></div>
    </section>

    <section class="panel">
        <div class="panel-head">
            <div style="display:flex;align-items:center;gap:8px;">
                <span>Claim Requests + Chat</span>
                <div class="tab-group">
                    <button id="claim-tab-pending" class="tab-btn active" type="button" onclick="setClaimTab('pending')">Pending</button>
                    <button id="claim-tab-all" class="tab-btn" type="button" onclick="setClaimTab('all')">All</button>
                </div>
            </div>
            <button class="btn" type="button" onclick="loadClaims(claimTab)">Refresh</button>
        </div>
        <div id="claimList" class="list"></div>
    </section>
</main>

<script>
    let reportTab = 'pending';
    let claimTab = 'pending';

    function getCookie(name) {
        const cookieValue = document.cookie
            .split(';')
            .map(cookie => cookie.trim())
            .find(cookie => cookie.startsWith(`${name}=`));
        return cookieValue ? decodeURIComponent(cookieValue.split('=').slice(1).join('=')) : '';
    }

    function esc(v) {
        return String(v || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function setReportTab(tab) {
        reportTab = tab;
        document.getElementById('report-tab-pending').classList.toggle('active', tab === 'pending');
        document.getElementById('report-tab-all').classList.toggle('active', tab === 'all');
        loadReports(tab);
    }

    function setClaimTab(tab) {
        claimTab = tab;
        document.getElementById('claim-tab-pending').classList.toggle('active', tab === 'pending');
        document.getElementById('claim-tab-all').classList.toggle('active', tab === 'all');
        loadClaims(tab);
    }

    async function loadReports(tab = 'pending') {
        const query = tab === 'pending' ? '?status=pending' : '';
        const res = await fetch(`/accounts/api/admin/reports/${query}`, { credentials: 'same-origin' });
        const list = document.getElementById('reportList');
        if (!res.ok) {
            list.innerHTML = '<div class="empty">Unable to load reports.</div>';
            return;
        }

        const reports = await res.json();
        if (!reports.length) {
            list.innerHTML = '<div class="empty">No lost/found reports available.</div>';
            return;
        }

        list.innerHTML = reports.map(report => `
            <article class="card">
                <div><strong>${esc(report.report_type.toUpperCase())}</strong> ${esc(report.name || report.type || 'Pet')}
                    <span class="status ${esc(report.status)}">${esc(report.status)}</span>
                </div>
                <div class="meta">By ${esc(report.author)} | ${esc(report.location || 'N/A')} | Contact ${esc(report.contact_info || 'N/A')}</div>
                ${report.description ? `<div class="meta" style="margin-top:6px;">${esc(report.description)}</div>` : ''}
                <div class="row">
                    <textarea id="report-note-${report.id}" rows="2" placeholder="Optional admin note">${esc(report.admin_note || '')}</textarea>
                    <div class="actions" style="align-content:flex-start;">
                        <button class="btn sage" type="button" onclick="decideReport(${report.id}, 'accepted')">Accept</button>
                        <button class="btn rust" type="button" onclick="decideReport(${report.id}, 'rejected')">Reject</button>
                    </div>
                </div>
            </article>
        `).join('');
    }

    async function decideReport(reportId, decision) {
        const note = document.getElementById(`report-note-${reportId}`).value.trim();
        const res = await fetch(`/accounts/api/admin/reports/${reportId}/decision/`, {
            method: 'PATCH',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ status: decision, admin_note: note })
        });

        if (!res.ok) {
            alert('Could not update report status.');
            return;
        }

        await loadReports(reportTab);
    }

    async function loadClaims(tab = 'pending') {
        const query = tab === 'pending' ? '?status=pending' : '';
        const res = await fetch(`/accounts/api/claims/${query}`, { credentials: 'same-origin' });
        const list = document.getElementById('claimList');
        if (!res.ok) {
            list.innerHTML = '<div class="empty">Unable to load claim requests.</div>';
            return;
        }

        const claims = await res.json();
        if (!claims.length) {
            list.innerHTML = '<div class="empty">No claim requests yet.</div>';
            return;
        }

        list.innerHTML = claims.map(claim => `
            <article class="card" id="claim-card-${claim.id}">
                <div><strong>Claim #${claim.id}</strong>
                    <span class="status ${esc(claim.status)}">${esc(claim.status)}</span>
                </div>
                <div class="meta">Claimant: ${esc(claim.claimant)} | Report #${esc(claim.report)}</div>
                <div class="meta">Pet Name: ${esc(claim.pet_name)}</div>
                <div class="meta" style="margin-top:6px;"><strong>Details:</strong> ${esc(claim.pet_details)}</div>
                <div class="meta" style="margin-top:6px;"><strong>Proof:</strong> ${esc(claim.proof)}</div>
                <div class="messages" id="claim-messages-${claim.id}">Loading messages...</div>
                <textarea id="claim-reply-${claim.id}" rows="2" placeholder="Reply to claimant"></textarea>
                <div class="actions">
                    <button class="btn" type="button" onclick="sendClaimMessage(${claim.id})">Send Message</button>
                    <button class="btn sage" type="button" onclick="decideClaim(${claim.id}, 'accepted')">Accept Claim</button>
                    <button class="btn rust" type="button" onclick="decideClaim(${claim.id}, 'rejected')">Reject Claim</button>
                </div>
            </article>
        `).join('');

        for (const claim of claims) {
            await loadClaimMessages(claim.id);
        }
    }

    async function loadClaimMessages(claimId) {
        const res = await fetch(`/accounts/api/claims/${claimId}/messages/`, { credentials: 'same-origin' });
        const box = document.getElementById(`claim-messages-${claimId}`);
        if (!res.ok) {
            box.innerHTML = 'Unable to load messages.';
            return;
        }

        const messages = await res.json();
        if (!messages.length) {
            box.innerHTML = 'No messages yet.';
            return;
        }

        box.innerHTML = messages.map(msg => `
            <div class="msg">
                <div class="msg-head">${esc(msg.sender)}</div>
                <div>${esc(msg.message)}</div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendClaimMessage(claimId) {
        const input = document.getElementById(`claim-reply-${claimId}`);
        const text = input.value.trim();
        if (!text) return;

        const res = await fetch(`/accounts/api/claims/${claimId}/messages/`, {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ message: text })
        });

        if (!res.ok) {
            alert('Unable to send message.');
            return;
        }

        input.value = '';
        await loadClaimMessages(claimId);
    }

    async function decideClaim(claimId, decision) {
        const input = document.getElementById(`claim-reply-${claimId}`);
        const adminReply = input.value.trim();
        const res = await fetch(`/accounts/api/admin/claims/${claimId}/decision/`, {
            method: 'PATCH',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ status: decision, admin_reply: adminReply })
        });

        if (!res.ok) {
            alert('Unable to update claim status.');
            return;
        }

        input.value = '';
        await loadClaims(claimTab);
    }

    loadReports(reportTab);
    loadClaims(claimTab);
</script>
</body>
</html>
