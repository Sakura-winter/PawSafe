<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSafe - Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        
input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--warm);
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
    
    
    box-sizing: border-box; 
}


* {
    box-sizing: border-box;
}
        :root {
            --cream: #FAF6F0; --warm: #F5ECD8; --bark: #3D2B1F; 
            --rust: #C0502A; --card-bg: #FFFDF9; --border: #E8DDD0;
            --radius: 20px;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--bark);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .login-card {
            background: var(--card-bg);
            border: 2px solid var(--bark);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%; max-width: 400px;
            box-shadow: 6px 6px 0 var(--bark);
        }
        h2 {
            font-family: 'Fraunces', serif;
            font-size: 2rem; font-weight: 900;
            margin-bottom: 8px; text-align: center;
        }
        .subtitle {
            text-align: center; color: #6B4A36;
            margin-bottom: 30px; font-size: 0.9rem;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-weight: 700; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        input {
            width: 100%; padding: 12px 16px;
            border: 2px solid var(--border); border-radius: 12px;
            background: var(--warm); font-family: inherit;
            transition: border-color 0.2s; outline: none;
        }
        input:focus { border-color: var(--rust); }
        .btn-login {
            width: 100%; padding: 14px;
            background: var(--rust); color: white;
            border: 2px solid var(--bark); border-radius: 12px;
            font-weight: 700; cursor: pointer;
            box-shadow: 3px 3px 0 var(--bark);
            transition: all 0.1s; margin-top: 10px;
        }
        .btn-login:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--bark); }
        .footer-link {
            text-align: center; margin-top: 20px; font-size: 0.85rem;
        }
        .footer-link a { color: var(--rust); text-decoration: none; font-weight: 700; }

        .admin-toggle {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #6B4A36;
        }

        .admin-toggle input {
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div style="text-align: center; font-size: 3rem; margin-bottom: 10px;">🐕</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Your pack is waiting for you.</p>

    <form id="loginForm">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <label class="admin-toggle">
            <input type="checkbox" id="adminLogin">
            Login as admin
        </label>
        <button type="submit" class="btn-login">Sign In 🐾</button>
    </form>

    <div class="footer-link">
        Don't have an account? <a href="/accounts/register-page/">Register here</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const adminLogin = document.getElementById('adminLogin').checked;
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        try {
            const response = await fetch('/accounts/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                credentials: 'same-origin',
                body: JSON.stringify({ username, password, admin_login: adminLogin })
            });

            const data = await response.json();

            if (response.ok) {
                // Store JWT only when token endpoint is used.
                if (data.access && data.refresh) {
                    localStorage.setItem('access', data.access);
                    localStorage.setItem('refresh', data.refresh);
                }
                
                alert("Login Successful!");
                window.location.href = data.redirect_to || "/accounts/dashboard/";
            } else {
                alert("Error: " + (data.message || data.detail || "Invalid credentials"));
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("An error occurred during login.");
        }
    });
</script>

</body>
</html>
