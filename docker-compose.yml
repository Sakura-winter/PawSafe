version: '3.8'
services:
  db:
    image: mysql:8
    container_name: pawsafe_db
    environment:
      MYSQL_DATABASE: pawsafe
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  web:
    build: .
    container_name: pawsafe_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=pawsafe
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db

volumes:
  db_data:

